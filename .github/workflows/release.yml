name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: make frontend

      - name: Embed migrations
        run: make embed-migrations

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o klaudio-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
            ./cmd/klaudio

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: klaudio-${{ matrix.os }}-${{ matrix.arch }}
          path: klaudio-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine Docker tags
        id: docker-tags
        run: |
          TAG=${GITHUB_REF_NAME}
          REPO="ghcr.io/${{ github.repository_owner }}/klaudio-agent"
          if echo "$TAG" | grep -qE '(-dev|-alpha|-beta|-rc)'; then
            echo "tags=${REPO}:${TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=${REPO}:${TAG},${REPO}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: docker/
          file: docker/Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-tags.outputs.tags }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: klaudio-*

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          cd release && sha256sum * > checksums-sha256.txt

      - name: Determine if pre-release
        id: prerelease
        run: |
          TAG=${GITHUB_REF_NAME}
          if echo "$TAG" | grep -qE '(-dev|-alpha|-beta|-rc)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "label=Pre-release" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "label=Stable" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Find previous tag (skip current)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> $GITHUB_OUTPUT
          else
            LOG=$(git log ${PREV_TAG}..${GITHUB_REF_NAME} --pretty=format:"- %s" --no-merges)
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: release/*
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
